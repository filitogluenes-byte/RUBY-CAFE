<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUBBY | İşletme Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-4">
    
    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
            <h2 class="text-2xl font-bold mb-6 text-green-400">Ürün Ekle</h2>
            <input id="item-name" type="text" placeholder="Örn: Türk Kahvesi" class="w-full p-3 rounded bg-slate-700 mb-4 border border-slate-600 outline-none text-white">
            <button onclick="addItem()" class="w-full bg-green-600 py-3 rounded-xl font-bold hover:bg-green-700 transition-all">MENÜYE EKLE</button>
            
            <h3 class="mt-8 mb-4 font-bold text-gray-400">Mevcut Menü</h3>
            <div id="admin-menu" class="space-y-2"></div>
        </div>

        <div>
            <h2 class="text-2xl font-bold mb-6 text-yellow-400">CANLI SİPARİŞLER</h2>
            <div id="order-list" class="space-y-4"></div>
        </div>
    </div>

    <script>
        // BURAYA KENDİ BİLGİLERİNİ YAPIŞTIR
        const firebaseConfig = {
            apiKey: "AIzaSyCbIIX37mZaP9w568r_-AmHTY1SmXhjePE",
            authDomain: "ruby-cafe.firebaseapp.com",
            databaseURL: "https://ruby-cafe-default-rtdb.firebaseio.com", // BU SATIRIN OLDUĞUNDAN EMİN OL
            projectId: "ruby-cafe",
            storageBucket: "ruby-cafe.appspot.com",
            messagingSenderId: "684388517436",
            appId: "1:684388517436:web:b36de3c5fc794ae7992539"
        };

        // Firebase başlat
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // Ürün Ekleme Fonksiyonu
        function addItem() {
            const nameInput = document.getElementById('item-name');
            const name = nameInput.value.trim();
            if(name !== "") {
                db.ref('menu').push({ name: name })
                .then(() => {
                    nameInput.value = '';
                    console.log("Ürün eklendi");
                })
                .catch((error) => {
                    alert("Hata: " + error.message);
                });
            }
        }

        // Menüyü Listeleme
        db.ref('menu').on('value', (snap) => {
            const div = document.getElementById('admin-menu');
            div.innerHTML = '';
            snap.forEach(child => {
                div.innerHTML += `
                <div class="flex justify-between p-2 bg-slate-700 rounded-lg text-sm border border-slate-600">
                    <span>${child.val().name}</span>
                    <button onclick="deleteItem('${child.key}')" class="text-red-400 font-bold">SİL</button>
                </div>`;
            });
        });

        function deleteItem(key) {
            db.ref('menu/' + key).remove();
        }

        // Siparişleri Listeleme
        db.ref('orders').on('value', (snap) => {
            const list = document.getElementById('order-list');
            list.innerHTML = '';
            snap.forEach(order => {
                const data = order.val();
                list.innerHTML = `
                    <div class="bg-white text-black p-5 rounded-2xl shadow-xl border-l-8 border-green-600">
                        <div class="flex justify-between">
                            <h3 class="font-black text-xl text-green-800">${data.customer}</h3>
                            <span class="text-xs text-gray-500">${data.time}</span>
                        </div>
                        <div class="mt-3 text-lg font-medium">${data.items.join(' , ')}</div>
                        <button onclick="finishOrder('${order.key}')" class="mt-4 w-full bg-slate-900 text-white py-2 rounded-lg font-bold">TAMAMLANDI</button>
                    </div>` + list.innerHTML;
            });
        });

        function finishOrder(key) {
            db.ref('orders/' + key).remove();
        }
    </script>
</body>
</html>
